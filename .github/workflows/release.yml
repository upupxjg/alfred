name: Release Alfred Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build workflow package
        run: |
          mkdir -p output
          cd timestamp-converter
          zip -qr ../output/timestamp-converter.alfredworkflow info.plist convert.sh README.md

      - name: Point rolling tag to current main commit
        run: |
          git tag -f main-release "$GITHUB_SHA"
          git push origin refs/tags/main-release --force

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view main-release >/dev/null 2>&1; then
            gh release upload main-release output/timestamp-converter.alfredworkflow --clobber
            gh release edit main-release \
              --title "Latest main build" \
              --notes "Automated release for the latest commit on main."
          else
            gh release create main-release output/timestamp-converter.alfredworkflow \
              --title "Latest main build" \
              --notes "Automated release for the latest commit on main."
          fi
